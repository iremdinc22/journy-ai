spring:
  datasource:
    url: jdbc:h2:mem:journy_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false

app:
  security:
    jwt-secret: test-secret-with-enough-length-for-hmac
    jwt-expiration-seconds: 86400
    refresh-token-expiration-seconds: 2592000
